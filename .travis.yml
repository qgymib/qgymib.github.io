language: node_js
node_js: stable
branches:
  only:
  - develop
before_install:
- npm install -g hexo-cli
- openssl aes-256-cbc -K $encrypted_f9d166a5883a_key -iv $encrypted_f9d166a5883a_iv
  -in travis.key.enc -out ~/.ssh/id_rsa -d
- chmod 600 ~/.ssh/id_rsa
- git config --global user.name "qgymib"
- git config --global user.email "qgymib@gmail.com"
install:
- npm install
- git clone -b master git@git.coding.net:qgymib/qgymib.git .deploy_git
script:
- hexo clean
- hexo generate
after_success:
- hexo deploy -m "[$TRAVIS_COMMIT] $TRAVIS_COMMIT_MESSAGE"
addons:
  ssh_known_hosts:
  - github.com
  - coding.net
