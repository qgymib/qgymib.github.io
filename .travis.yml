language: node_js
node_js: stable

branches:
  only:
  - site

cache:
  directories:
    - node_modules

before_install:
- npm install -g hexo-cli

install:
- git submodule init
- git submodule update
- npm install

script:
- hexo clean
- hexo generate

after_success:
- git config --global user.name "qgymib"
- git config --global user.email "qgymib@gmail.com"
- git clone -b master https://github.com/qgymib/qgymib.github.io.git .deploy_git
- mv .deploy_git/.git public/
- cd ./public
- git add .
- git commit -m "Travis CI Auto Build: `date +"%Y-%m-%d %H:%M:%S"`"
- git push --quiet --force https://$REPO_TOKEN@github.com/qgymib/qgymib.github.io.git master
